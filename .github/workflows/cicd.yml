# Name of your pipeline (shows up in GitHub Actions tab)
name: CI/CD Pipeline — Flask App

# ==========================================
# TRIGGER: WHEN does this pipeline run?
# ==========================================
on:
  push:
    branches:
      - main # Runs when you push to 'main' branch
      - develop # Also runs on 'develop' branch
  pull_request:
    branches:
      - main # Runs when someone opens a Pull Request to main

# ==========================================
# ENVIRONMENT VARIABLES (shared across all jobs)
# ==========================================
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app
  DOCKER_TAG: ${{ github.sha }} # Uses the git commit hash as image tag

# ==========================================
# JOBS: The actual steps of the pipeline
# ==========================================
jobs:
  # ---- JOB 1: Run Tests ----
  test:
    name: Run Tests
    runs-on: ubuntu-latest # GitHub provides a free Ubuntu virtual machine

    steps:
      # Step 1: Download your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Install your Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the automated tests
      - name: Run pytest tests
        run: |
          pytest tests/ -v --tb=short
          # -v means verbose (show each test name)
          # --tb=short shows short traceback on failure

  # ---- JOB 2: Build and Push Docker Image ----
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test # IMPORTANT: Only runs if the 'test' job passes!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Log in to Docker Hub
      # Uses secrets you'll configure in GitHub Settings
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 2: Set up Docker Buildx (modern Docker build engine)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the Docker image and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Build from the root of the project
          push: true # Actually push to Docker Hub
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

  # ---- JOB 3: Deploy to Kubernetes ----
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push # Only runs if build-and-push succeeds!
    if: github.ref == 'refs/heads/main' # ONLY deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Install kubectl on the GitHub Actions VM
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      # Step 2: Configure kubectl to connect to YOUR cluster
      # This uses the KUBE_CONFIG secret you'll add to GitHub
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo '${{ secrets.KUBE_CONFIG }}' | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Step 3: Update the deployment with the new image
      - name: Update Kubernetes deployment
        run: |
          # Replace the image tag in deployment file
          sed -i 's|YOUR_DOCKERHUB_USERNAME/flask-app:latest|${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}|g' kubernetes/deployment.yml

          # Apply the updated deployment
          kubectl apply -f kubernetes/deployment.yml
          kubectl apply -f kubernetes/service.yml

      # Step 4: Wait for deployment to finish and verify success
      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/flask-app-deployment --timeout=120s
          kubectl get pods
          kubectl get services
